# FLOFER BRINKS — Render Blueprint (free web + Postgres)
# https://render.com/docs/blueprint-spec

databases:
  - name: flofer-brinks-db
    plan: free
    databaseName: flofer_brinks
    user: flofer

services:
  - type: web
    name: flofer-brinks
    runtime: docker
    plan: free
    region: frankfurt
    healthCheckPath: /api/health
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: flofer-brinks-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: DEMO_AUTH
        value: "true"
      - key: SERVE_FRONTEND
        value: "true"
      - key: FRONTEND_DIST
        value: /app/frontend/dist
      - key: APP_PUBLIC_URL
        value: https://flofer-brinks.onrender.com
      - key: CORS_ORIGINS
        value: "*"
      - key: GOOGLE_MAPS_SERVER_KEY
        sync: false
      - key: GOOGLE_MAPS_BROWSER_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: PYTHONPATH
        value: /app
